<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Shop</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

   <nav class="navbar">
    <h2 class="logo">FlexShop</h2>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="Products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
    <div id="authArea">
        <a href="login.html" id="loginLink">Login</a>
        <span id="userDisplay"></span>
        <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
</nav>

    <main>
        <header class="contact-header">
            <h1>Contact Us</h1>
            <p>We're here to help. Reach out anytime.</p>
        </header>

        <section class="contact-container">
            <div class="contact-form">
                <form>
                    <h2>Send a Message</h2>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="text" placeholder="Subject" required>
                    <textarea placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <h2>Contact Information</h2>
                <p><strong>Email:</strong> support@flexshop.com</p>
                <p><strong>Phone:</strong> +1 (709) 123-4567</p>
                <p><strong>Address:</strong> Newfoundland, Canada</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 FlexShop. All rights reserved.</p>
    </footer>

    <script>
    const user = localStorage.getItem("loggedInUser");

    const userDisplay = document.getElementById("userDisplay");
    const loginLink = document.getElementById("loginLink");
    const logoutBtn = document.getElementById("logoutBtn");

    if (user) {
        userDisplay.innerText = "Welcome, " + user;
        loginLink.style.display = "none";
        logoutBtn.style.display = "inline-block";
    }

    logoutBtn.addEventListener("click", function () {
        localStorage.removeItem("loggedInUser");
        location.reload();
    });
    </script>

    <script src="auth.js"></script>

    <script src="cart.js"></script>

</body>
</html>
